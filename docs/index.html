<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Transformations</title>
  <!--
    Content-Security-Policy
    · default-src 'self'   → only same-origin resources
    · script-src 'self'    → no inline scripts, no eval
    · style-src 'self'     → no inline styles in HTML
    · connect-src 'self'   → fetch() only to same origin (words.json)
    · img-src 'self' data: → allow data: URIs for SVG
    · object-src 'none'    → block Flash / plugins entirely
    · base-uri 'self'      → prevent base-tag injection attacks
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self';" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">&#8635;</span>
      <span class="logo-text">Word<strong>Transformations</strong></span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search any word…" autocomplete="off" spellcheck="false" />
      <span class="search-icon">&#128269;</span>
      <div id="searchDropdown" class="search-dropdown hidden"></div>
    </div>
  </div>
</header>

<!-- ══════════════════════ MAIN LAYOUT ══════════════════════ -->
<div class="layout">

  <!-- ── Sidebar: Transformation Rules ── -->
  <aside id="sidebar" class="sidebar">
    <button id="sidebarToggle" class="sidebar-toggle" title="Toggle rules panel">
      <span>&#128218; Transformation Rules</span>
      <span class="chevron">&#9654;</span>
    </button>
    <div id="sidebarContent" class="sidebar-content collapsed">
      <p class="sidebar-intro">Common suffixes and prefixes that change a word's grammatical category.</p>
      <div id="rulesList"></div>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <main class="main-content">

    <!-- Tab nav -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="explorer">&#128269; Explorer</button>
      <button class="tab-btn" data-tab="categories">&#128193; Categories</button>
      <button class="tab-btn" data-tab="quiz">&#129504; Quiz</button>
    </nav>

    <!-- ────────── EXPLORER TAB ────────── -->
    <section id="tab-explorer" class="tab-panel active">
      <div id="explorerHero" class="hero-prompt">
        <p>Search a word above, click a category tag, or pick a word below to explore its full word family.</p>
        <div id="featuredPills" class="featured-pills"></div>
      </div>
      <div id="wordCard" class="word-card hidden"></div>
      <div id="explorerGrid" class="explorer-grid"></div>
    </section>

    <!-- ────────── CATEGORIES TAB ────────── -->
    <section id="tab-categories" class="tab-panel hidden">
      <div class="cat-buttons" id="catButtons"></div>
      <div id="catWordList" class="cat-word-list"></div>
    </section>

    <!-- ────────── QUIZ TAB ────────── -->
    <section id="tab-quiz" class="tab-panel hidden">
      <div class="quiz-wrap">
        <div class="quiz-score-bar">
          <span>Score: <strong id="scoreNum">0</strong></span>
          <span>Streak: <strong id="streakNum">0</strong> &#128293;</span>
          <span>Total: <strong id="totalNum">0</strong></span>
          <button id="resetScore" class="btn-ghost">Reset</button>
        </div>

        <div id="quizCard" class="quiz-card">
          <div class="quiz-question" id="quizQuestion">Press "Next Question" to start the quiz!</div>
          <div id="quizOptions" class="quiz-options"></div>
          <div id="quizFeedback" class="quiz-feedback hidden"></div>
          <div id="quizFamily" class="quiz-family hidden"></div>
        </div>

        <div class="quiz-actions">
          <button id="nextQuiz" class="btn-primary">Next Question &#10145;</button>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- ══════════════════════ WORD CARD TEMPLATE ══════════════════════ -->
<template id="wordCardTpl">
  <div class="wc-header">
    <div class="wc-base">
      <span class="wc-word"></span>
      <span class="category-badge wc-badge"></span>
    </div>
    <div class="wc-def"></div>
    <div class="wc-example-base"></div>
  </div>
  <div class="wc-transforms">
    <h3>Word Family</h3>
    <div class="wc-transform-list"></div>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
